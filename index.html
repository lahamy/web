<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متصفح المواقع</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            direction: rtl;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 14px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .error {
            background: #ffe6e6;
            color: #c0392b;
        }
        .success {
            background: #e6ffe6;
            color: #27ae60;
        }
        .history {
            margin-top: 25px;
        }
        .history h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }
        .history-item:hover {
            background: #e8e8e8;
        }
        .history-url {
            color: #667eea;
            text-decoration: none;
            flex: 1;
            word-break: break-all;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 10px;
        }
        .delete-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 متصفح المواقع</h1>
        
        <div class="input-group">
            <input 
                type="text" 
                id="url" 
                placeholder="أدخل رابط الموقع (youtube.com)"
                onkeypress="if(event.key=='Enter') openWebsite()"
            >
            <button onclick="openWebsite()">فتح</button>
        </div>
        
        <div id="message" class="message"></div>
        
        <div class="history">
            <h2>📜 السجل</h2>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        // تحميل السجل من localStorage
        function loadHistory() {
            var history = JSON.parse(localStorage.getItem('websiteHistory') || '[]');
            var historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            history.forEach((item, index) => {
                var div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <button class="delete-btn" onclick="deleteHistory(${index})">حذف</button>
                    <span class="history-url" onclick="openHistoryLink('${item.url}')">${item.title}</span>
                `;
                historyList.appendChild(div);
            });
        }
        
        // فتح رابط من السجل
        function openHistoryLink(url) {
            document.getElementById('url').value = url;
            openWebsite();
        }
        
        // حذف من السجل
        function deleteHistory(index) {
            var history = JSON.parse(localStorage.getItem('websiteHistory') || '[]');
            history.splice(index, 1);
            localStorage.setItem('websiteHistory', JSON.stringify(history));
            loadHistory();
        }
        
        // حفظ في السجل
        function saveToHistory(url) {
            var history = JSON.parse(localStorage.getItem('websiteHistory') || '[]');
            
            // منع التكرار
            history = history.filter(item => item.url !== url);
            
            // إضافة في البداية
            history.unshift({
                url: url,
                title: new URL(url).hostname,
                time: new Date().toLocaleString('ar-SA')
            });
            
            // احتفظ بآخر 20 رابط فقط
            history = history.slice(0, 20);
            
            localStorage.setItem('websiteHistory', JSON.stringify(history));
            loadHistory();
        }
        
        function openWebsite() {
            var url = document.getElementById('url').value.trim();
            var messageDiv = document.getElementById('message');
            
            messageDiv.style.display = 'none';
            
            if (!url) {
                messageDiv.textContent = '❌ الرجاء إدخال رابط الموقع';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            try {
                new URL(url); // تحقق من صحة الرابط
                saveToHistory(url);
                window.open(url, '_blank');
                
                messageDiv.textContent = '✅ تم فتح الموقع في نافذة جديدة!';
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                
                document.getElementById('url').value = '';
            } catch (e) {
                messageDiv.textContent = '❌ الرابط غير صحيح';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        }
        
        // تحميل السجل عند بدء الصفحة
        loadHistory();
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متصفح المواقع</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            direction: rtl;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-top: 0;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #764ba2;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: none;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }
        .success {
            color: #27ae60;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 متصفح المواقع</h1>
        
        <div class="input-group">
            <input 
                type="text" 
                id="url" 
                placeholder="أدخل رابط الموقع (https://google.com)"
                onkeypress="if(event.key=='Enter') openWebsite()"
            >
            <button onclick="openWebsite()">فتح</button>
        </div>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <iframe id="browser"></iframe>
    </div>

    <script>
        function openWebsite() {
            var url = document.getElementById('url').value;
            var errorDiv = document.getElementById('error');
            var successDiv = document.getElementById('success');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!url) {
                errorDiv.textContent = '❌ الرجاء إدخال رابط الموقع';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            // استخدام خدمة وسيطة
            var proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
            
            document.getElementById('browser').src = proxyUrl;
            document.getElementById('browser').style.display = 'block';
            
            successDiv.textContent = '✅ تم فتح الموقع بنجاح!';
            successDiv.style.display = 'block';
        }
    </script>
</body>
</html>
