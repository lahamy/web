<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متصفح المواقع</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            direction: rtl;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-top: 0;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #764ba2;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: none;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }
        .success {
            color: #27ae60;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 متصفح المواقع</h1>
        
        <div class="input-group">
            <input 
                type="text" 
                id="url" 
                placeholder="أدخل رابط الموقع (https://google.com)"
                onkeypress="if(event.key=='Enter') openWebsite()"
            >
            <button onclick="openWebsite()">فتح</button>
        </div>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <iframe id="browser"></iframe>
    </div>

    <script>
        function openWebsite() {
            var url = document.getElementById('url').value;
            var errorDiv = document.getElementById('error');
            var successDiv = document.getElementById('success');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!url) {
                errorDiv.textContent = '❌ الرجاء إدخال رابط الموقع';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            // استخدام خدمة وسيطة
            var proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
            
            document.getElementById('browser').src = proxyUrl;
            document.getElementById('browser').style.display = 'block';
            
            successDiv.textContent = '✅ تم فتح الموقع بنجاح!';
            successDiv.style.display = 'block';
        }
    </script>
</body>
</html>
